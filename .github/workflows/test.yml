name: Full Test Suite

on:
  workflow_dispatch:
    inputs:
      run_instrumented_tests:
        description: 'Run instrumented tests (requires emulator)'
        required: false
        default: false
        type: boolean

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    name: Unit Tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Install NDK
        run: |
          sdkmanager "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
        
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            app/src/main/jni/boost
            app/src/main/jni/boost-*.tar.xz
          key: cmake-${{ runner.os }}-${{ hashFiles('app/src/main/jni/CMakeLists.txt') }}
          restore-keys: |
            cmake-${{ runner.os }}-
            
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Run Unit Tests
        run: ./gradlew :app:testDebugUnitTest :plugin-api:test --no-daemon
        
      - name: Generate Test Report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: '**/build/test-results/test*UnitTest/*.xml'
          fail_on_failure: true
          
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            app/build/test-results/testDebugUnitTest/
            plugin-api/build/test-results/
          retention-days: 7

  instrumented-tests:
    if: ${{ github.event.inputs.run_instrumented_tests == 'true' }}
    runs-on: ubuntu-latest
    name: Instrumented Tests
    needs: unit-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
        
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Install NDK
        run: |
          sdkmanager "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
        
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
        
      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            app/src/main/jni/boost
            app/src/main/jni/boost-*.tar.xz
          key: cmake-${{ runner.os }}-${{ hashFiles('app/src/main/jni/CMakeLists.txt') }}
          restore-keys: |
            cmake-${{ runner.os }}-
            
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Run Instrumented Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: pixel_3a
          script: ./gradlew :app:connectedDebugAndroidTest --no-daemon
        
      - name: Upload Instrumented Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-results
          path: app/build/outputs/androidTest-results/connected/
          retention-days: 7

  test-coverage:
    runs-on: ubuntu-latest
    name: Test Coverage Report
    needs: [unit-tests]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: test-results/
          
      - name: Generate Coverage Summary
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Count test files
          TEST_FILES=$(find test-results -name "*.xml" | wc -l)
          echo "Total test result files: $TEST_FILES" >> $GITHUB_STEP_SUMMARY
          
          # Parse test results
          for xml_file in test-results/**/*.xml; do
            if [ -f "$xml_file" ]; then
              TESTS=$(grep 'tests=' "$xml_file" | sed 's/.*tests="\([0-9]*\)".*/\1/')
              FAILURES=$(grep 'failures=' "$xml_file" | sed 's/.*failures="\([0-9]*\)".*/\1/' || echo 0)
              ERRORS=$(grep 'errors=' "$xml_file" | sed 's/.*errors="\([0-9]*\)".*/\1/' || echo 0)
              echo "- $(basename ${xml_file%.xml}): $TESTS tests, $FAILURES failures, $ERRORS errors" >> $GITHUB_STEP_SUMMARY
            fi
          done